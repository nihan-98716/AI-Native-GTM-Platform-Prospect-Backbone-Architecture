services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gtm}
      POSTGRES_USER: ${POSTGRES_USER:-gtm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gtm}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://gtm:gtm@db:5432/gtm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKFLOW_REDIS_URL: ${WORKFLOW_REDIS_URL:-redis://redis:6379/0}
      WORKFLOW_INLINE_EXECUTION: ${WORKFLOW_INLINE_EXECUTION:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ISSUER: ${JWT_ISSUER:-gtm-local}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-gtm-api}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      APP_ENV: ${APP_ENV:-local}
      AUTO_SEED_ON_STARTUP: ${AUTO_SEED_ON_STARTUP:-true}
      SEED_DIR: ${SEED_DIR:-/app/data}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8000}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    entrypoint: ["sh", "/usr/local/bin/worker-entrypoint.sh"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://gtm:gtm@db:5432/gtm}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      WORKFLOW_REDIS_URL: ${WORKFLOW_REDIS_URL:-redis://redis:6379/0}
      WORKFLOW_INLINE_EXECUTION: ${WORKFLOW_INLINE_EXECUTION:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ISSUER: ${JWT_ISSUER:-gtm-local}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-gtm-api}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      APP_ENV: ${APP_ENV:-local}
      AUTO_SEED_ON_STARTUP: ${AUTO_SEED_ON_STARTUP:-true}
      SEED_DIR: ${SEED_DIR:-/app/data}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os; import redis; redis.Redis.from_url(os.environ['WORKFLOW_REDIS_URL']).ping()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
